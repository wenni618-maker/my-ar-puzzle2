<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼圖遊戲 - 直式模式</title>
    <style>
        /* 這裡放你原本直式的 CSS */
        body { background: #2c3e50; color: white; text-align: center; }
    </style>
</head>
<body>
    <h1>這是直式拼圖面</h1>
    <script>
        function monitorOrientation() {
            // 如果寬度突然大於高度，表示使用者把手機轉橫了
            if (window.innerWidth > window.innerHeight) {
                window.location.replace("index(橫式適用).html?t=" + new Date().getTime());
            }
        }
        // 監聽視窗尺寸變化
        window.addEventListener("resize", monitorOrientation);
    </script>
</body>
</html>
