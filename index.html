<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>載入中...</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div>正在偵測裝置方向...</div>
    <script>
        function checkOrientation() {
            // 判斷寬度是否大於高度
            const isLandscape = window.innerWidth > window.innerHeight;
            const target = isLandscape ? "index(橫式適用).html" : "index(直式適用).html";
            
            // 執行跳轉並加上時間戳防止快取
            window.location.replace(target + "?t=" + new Date().getTime());
        }

        // 確保在各種載入階段都能觸發
        if (document.readyState === 'complete') {
            checkOrientation();
        } else {
            window.addEventListener("load", checkOrientation);
        }
    </script>
</body>
</html>
