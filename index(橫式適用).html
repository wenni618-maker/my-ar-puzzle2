<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼圖遊戲 - 橫式模式</title>
    <style>
        /* 這裡放你原本橫式的 CSS */
        body { background: #8e44ad; color: white; text-align: center; }
    </style>
</head>
<body>
    <h1>這是橫式拼圖面</h1>
    <script>
        function monitorOrientation() {
            // 如果高度突然大於寬度，表示使用者把手機轉直了
            if (window.innerHeight > window.innerWidth) {
                window.location.replace("index(直式適用).html?t=" + new Date().getTime());
            }
        }
        window.addEventListener("resize", monitorOrientation);
    </script>
</body>
</html>
